apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-api-config
data:
  # Bind inside the container (must match Service targetPort).
  LISTEN_ADDR: ":8080"
  # Required by api.weather.gov — use a real contact in production.
  NWS_USER_AGENT: "weather-api (k8s; replace-with-your-contact@example.com)"
  # Optional override for IBM Weather Company base URL.
  # WEATHER_BASE_URL: "https://api.weather.com"
