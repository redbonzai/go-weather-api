apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: weather-api

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml

# Optional Ingress example (not applied by default): see ../ingress.yaml and deploy/k8s/README.md

labels:
  - pairs:
      app.kubernetes.io/name: weather-api
      app.kubernetes.io/part-of: weather-api
    includeSelectors: false
