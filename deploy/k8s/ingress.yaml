# Example only — not included in kustomization.yaml by default.
# Adjust ingressClassName and rules for your cluster (GKE, EKS, nginx, traefik, etc.).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-api
  annotations:
    # nginx ingress controller example:
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "15"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "15"
spec:
  ingressClassName: nginx
  rules:
    - host: weather-api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weather-api
                port:
                  number: 80
